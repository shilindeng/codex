interface:
  display_name: "公众号图文工作室"
  short_description: "公众号选题、写作、评审、评分、配图、排版与草稿发布一体化技能"
  brand_color: "#0F766E"
  default_prompt: "Use $wechat-article-studio to take a WeChat Official Account article from topic to render. If the user provides no topic or says “开始 / 开启公众号创作”, first run `python {SKILL_DIR}/scripts/studio.py discover-topics --workspace <job-dir> --window-hours 24 --limit 8 --provider auto --focus ai-tech`, then show candidates + scoring and ask the user to pick one (do not proceed to writing until the user chooses). After the user chooses an index, run `python {SKILL_DIR}/scripts/studio.py select-topic --workspace <job-dir> --index <N> --angle-index 1` to persist the selection into manifest.json (topic/direction/selected_title/source_urls). Before writing the final article, create a structured viral blueprint (viral_blueprint: core_viewpoint, secondary_viewpoints, persuasion_strategies, emotion_triggers, target_quotes, emotion_curve, emotion_layers, argument_modes, perspective_shifts, style_traits, pain_points, emotion_value_goals) and write it into `<job-dir>/ideation.json` under `outline_meta.viral_blueprint` (or `viral_blueprint`). Then continue with `python {SKILL_DIR}/scripts/studio.py hosted-run --workspace <job-dir> --topic \"<topic>\" --to render` (source_urls will be picked from the manifest). hosted-run/run will automatically do multi-round revisions (max 3 by default; can override with `--max-revision-rounds`). Prefer writing the agent-authored markdown into `<job-dir>/article.md` and passing `--article-file` when available. Only publish after explicit user confirmation with `--confirmed-publish`."

policy:
  allow_implicit_invocation: true
