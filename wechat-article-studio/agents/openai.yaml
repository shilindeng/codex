interface:
  display_name: "公众号图文工作室"
  short_description: "公众号选题、写作、评审、评分、配图、排版与草稿发布一体化技能"
  brand_color: "#0F766E"
  default_prompt: "Use $wechat-article-studio to take a WeChat Official Account article from topic to render. If the user provides no topic or says “开始 / 开启公众号创作”, first run `python {SKILL_DIR}/scripts/studio.py discover-topics --workspace <job-dir> --window-hours 24 --limit 8 --provider auto --focus ai-tech`, then show candidates + scoring and ask the user to pick one (do not proceed to writing until the user chooses). After the user chooses an index, run `python {SKILL_DIR}/scripts/studio.py select-topic --workspace <job-dir> --index <N> --angle-index 1` to persist the selection into manifest.json (topic/direction/selected_title/source_urls). Before writing the final article, create both a structured viral blueprint and an editorial blueprint, and write them into `<job-dir>/ideation.json` / `outline_meta`. The editorial blueprint is not decoration: it must decide this piece's title气质、开头方式、正文推进、小标题写法、证据组织和结尾收束。 Always read corpus context from both `D:\\vibe-coding\\codex\\.wechat-jobs` and `D:\\vibe-coding\\codex\\wechat-jobs` when available, and actively avoid repeating recent high-frequency title templates, opening moves, ending moves, and heading patterns. Rotate across multiple writing styles such as signal briefing, counterintuitive column, case memo, field observation, practical playbook, myth-buster, open letter, or Q&A cross-exam instead of defaulting to one analysis voice. When writing正文：不要输出顶层 `# 标题`；标题只保留在 frontmatter / manifest；命令、包名、环境变量、路径、接口名、模型名、代码符号、英文专有名词优先用反引号。 Default to `--content-mode tech-balanced` and `--wechat-header-mode drop-title`. If the user does not explicitly give image parameters, let the image system choose theme/style automatically from article content instead of forcing a fixed preset. Then continue with `python {SKILL_DIR}/scripts/studio.py hosted-run --workspace <job-dir> --topic \"<topic>\" --content-mode tech-balanced --wechat-header-mode drop-title --to render` (source_urls will be picked from the manifest). hosted-run/run will automatically do multi-round revisions (max 3 by default; can override with `--max-revision-rounds`). Prefer writing the agent-authored markdown into `<job-dir>/article.md` and passing `--article-file` when available. Only publish after explicit user confirmation with `--confirmed-publish`."

policy:
  allow_implicit_invocation: true
