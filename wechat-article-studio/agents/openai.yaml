interface:
  display_name: "公众号图文工作室"
  short_description: "公众号选题、写作、评审、评分、配图、排版与草稿发布一体化技能"
  brand_color: "#0F766E"
  default_prompt: "Use $wechat-article-studio to take a WeChat Official Account article from research to render. Prefer `python {SKILL_DIR}/scripts/studio.py run --workspace <job-dir> --topic \"<topic>\" --to render` first, and only publish after explicit user confirmation with `--confirmed-publish`."

policy:
  allow_implicit_invocation: true
