interface:
  display_name: "公众号图文工作室"
  short_description: "公众号选题、写作、评审、评分、配图、排版与草稿发布一体化技能"
  brand_color: "#0F766E"
  default_prompt: "Use $wechat-article-studio to take a WeChat Official Account article from topic to render. If the user provides no topic or says “开始 / 开启公众号创作”, first run `python {SKILL_DIR}/scripts/studio.py discover-topics --workspace <job-dir> --window-hours 24 --limit 8 --provider auto`, then show candidates + scoring and ask the user to pick one (do not proceed to writing until the user chooses). After selection, use the chosen topic as `--topic` and include the candidate `source_url` as `--source-url` to improve credibility, then continue with `python {SKILL_DIR}/scripts/studio.py hosted-run --workspace <job-dir> --topic \"<topic>\" --to render`. Prefer writing the agent-authored markdown into `<job-dir>/article.md` and passing `--article-file` when available. Only publish after explicit user confirmation with `--confirmed-publish`."

policy:
  allow_implicit_invocation: true
